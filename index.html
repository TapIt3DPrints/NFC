<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Smith | Digital Card</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:35px;
border-radius:20px;
max-width:420px;
width:90%;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.profile{
width:90px;
height:90px;
border-radius:50%;
background:#ddd;
margin:auto;
margin-bottom:15px;
}

h1{
margin:5px 0;
}

.title{
color:#666;
margin-bottom:15px;
}

.info{
text-align:left;
margin-top:15px;
line-height:1.6;
font-size:15px;
}

.label{
font-weight:bold;
}

.buttons{
margin-top:20px;
}

.button{
display:block;
text-decoration:none;
background:#4facfe;
color:white;
padding:12px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
}

.button:hover{
background:#3a8de0;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<div class="profile"></div>

<h1>Jordan Smith</h1>
<p class="title">Real Estate Agent</p>

<div class="info">
<p><span class="label">Phone:</span> (555) 123-4567</p>
<p><span class="label">Email:</span> jordan@example.com</p>
<p><span class="label">Website:</span> www.jordansmithhomes.com</p>
<p><span class="label">Location:</span> Atlanta, Georgia</p>
</div>

<div class="buttons">
<a class="button" href="tel:5551234567">Call</a>
<a class="button" href="mailto:jordan@example.com">Send Email</a>
<a class="button" href="https://example.com">Visit Website</a>
<a class="button" href="https://instagram.com">Instagram</a>
</div>

<div class="footer">
Powered by Tap It!
</div>

</div>

</body>
</html>
