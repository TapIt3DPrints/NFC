<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jordan's Card</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:18px;
width:320px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

h1{
margin:10px 0;
}

p{
color:#666;
margin-bottom:20px;
}

.button{
display:block;
margin:8px 0;
padding:12px;
background:#4facfe;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.footer{
margin-top:18px;
font-size:13px;
color:#888;
}

</style>
</head>

<body>

<div class="card">

<img src="profile.jpg" class="profile">

<h1>Jordan</h1>

<p>Powered by NFC Business Card</p>

<a class="button" href="tel:5555555555">Call</a>
<a class="button" href="mailto:jordan@email.com">Email</a>
<a class="button" href="#">Website</a>

<div class="footer">
Powered by Tap It!
</div>

</div>

</body>
</html>
