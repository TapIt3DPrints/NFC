<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jordan | NFC Card</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* animated floating background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.2),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(255,255,255,0.15),transparent 40%);
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translate(-10%,-10%)}
50%{transform:translate(-5%,5%)}
100%{transform:translate(-10%,-10%)}
}

.card{
position:relative;
background:white;
width:340px;
padding:40px 30px;
border-radius:22px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
animation:fadeIn .9s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid #4facfe;
margin-bottom:15px;
}

h1{
margin:10px 0 5px 0;
font-size:26px;
}

.title{
color:#666;
margin-bottom:25px;
}

/* buttons */

.button{
display:block;
margin:10px 0;
padding:14px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#4facfe,#00c6ff);
transition:transform .2s, box-shadow .2s;
}

.button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* divider */

.divider{
height:1px;
background:#eee;
margin:25px 0;
}

/* NFC badge */

.nfc{
font-size:14px;
color:#555;
margin-top:5px;
}

/* footer */

.footer{
margin-top:15px;
font-size:13px;
color:#888;
}

.brand{
font-weight:bold;
color:#4facfe;
}

</style>
</head>

<body>

<div class="card">

<img src="profile.jpg" class="profile">

<h1>Jordan Smith</h1>
<div class="title">Photographer & Creator</div>

<a class="button" href="tel:5555555555">📞 Call</a>
<a class="button" href="mailto:jordan@email.com">✉️ Email</a>
<a class="button" href="#">🌐 Website</a>
<a class="button" href="#">📷 Instagram</a>

<div class="divider"></div>

<div class="nfc">Tapped via NFC</div>

<div class="footer">
Powered by <span class="brand">Tap It!</span>
</div>

</div>

</body>
</html>
